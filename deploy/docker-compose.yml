services:
  mysql:
    image: mysql:8.0
    container_name: niuma-mysql
    environment:
      MYSQL_ROOT_PASSWORD: Niuma@2024MySQL
      MYSQL_DATABASE: niuma
      TZ: Asia/Tokyo
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: niuma-redis
    command: redis-server --requirepass Niuma@2024Redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ./data/redis:/data
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: niuma-rabbitmq
    environment:
      TZ: Asia/Tokyo
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    volumes:
      - ./data/rabbitmq:/var/lib/rabbitmq
    restart: unless-stopped
